<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<title>Pabliki Growth — Roadmap</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#0B0D17;--bg2:#111428;--bg3:#0D1117;
  --card:linear-gradient(145deg,#161B2E,#1C2333);
  --card-solid:#161B2E;
  --border:rgba(255,255,255,0.07);
  --gold1:#C9A44C;--gold2:#E8D07E;
  --green:#2DD4A8;--red:#FF6B6B;--blue:#60A5FA;--purple:#A78BFA;--orange:#FB923C;
  --text:#E8E8F0;--text2:#7B8394;--text3:#4A5068;
  --radius:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);padding:0;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(80px + var(--safe-bottom))}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:128px;pointer-events:none;z-index:0;opacity:.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(201,164,76,.2);border-radius:2px}

.container{max-width:520px;margin:0 auto;padding:16px;position:relative;z-index:1}

/* HEADER */
.header{text-align:center;padding:24px 0 8px}
.header h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,var(--gold1),var(--gold2),var(--gold1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.header p{color:var(--text2);font-size:13px;margin-top:4px}

/* PROGRESS BAR */
.progress-section{margin:20px 0}
.progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-header span{font-size:13px;color:var(--text2)}
.progress-header strong{font-size:24px;font-weight:800;color:var(--green)}
.progress-bar{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold1));border-radius:4px;transition:width 0.6s ease}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.stat .num{font-size:22px;font-weight:800}
.stat .label{font-size:10px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.stat.green .num{color:var(--green)}
.stat.orange .num{color:var(--orange)}
.stat.blue .num{color:var(--blue)}

/* TABS */
.tabs{display:flex;gap:6px;margin:20px 0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid transparent;white-space:nowrap}
.tab.active{background:linear-gradient(135deg,rgba(201,164,76,0.15),rgba(232,208,126,0.1));color:var(--gold2);border-color:rgba(201,164,76,0.3)}

/* PHASE CARD */
.phase{margin-bottom:20px;animation:fadeIn .4s ease}
.phase-header{display:flex;align-items:center;gap:12px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;transition:all .3s}
.phase-header:active{transform:scale(0.99)}
.phase-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.phase-info{flex:1;min-width:0}
.phase-info h3{font-size:15px;font-weight:700;margin-bottom:2px}
.phase-info .meta{font-size:11px;color:var(--text2)}
.phase-progress{font-size:14px;font-weight:700;flex-shrink:0}
.phase-chevron{color:var(--text3);transition:transform .3s;flex-shrink:0}
.phase.open .phase-chevron{transform:rotate(180deg)}

.phase-body{background:var(--card-solid);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;display:none;padding:8px 16px 16px}
.phase.open .phase-body{display:block}

/* TASK ITEM */
.task{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);transition:opacity .3s}
.task:last-child{border-bottom:none}
.task.done{opacity:0.5}
.task-check{width:24px;height:24px;border-radius:8px;border:2px solid var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .3s;margin-top:1px}
.task-check:active{transform:scale(0.9)}
.task.done .task-check{background:var(--green);border-color:var(--green)}
.task.done .task-check::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.task-content{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;line-height:1.4}
.task.done .task-title{text-decoration:line-through;color:var(--text2)}
.task-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.4}
.task-content{cursor:pointer}
.task-howto{display:none;margin-top:10px;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid rgba(255,255,255,0.06);font-size:12.5px;color:var(--text2);line-height:1.7}
.task.expanded .task-howto{display:block;animation:fadeIn .3s ease}
.task-howto h5{color:var(--gold2);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.task-howto p{margin-bottom:8px}
.task-howto ul{margin:6px 0 10px 16px}
.task-howto li{margin-bottom:4px}
.task-howto .step{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.task-howto .step-num{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,rgba(201,164,76,0.2),rgba(232,208,126,0.1));color:var(--gold2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-howto .step-text{flex:1;color:var(--text)}
.task-howto .tip{margin-top:8px;padding:8px 10px;background:rgba(45,212,168,0.08);border-radius:8px;border-left:3px solid var(--green);font-size:11.5px;color:var(--green)}
.task-expand-hint{font-size:11px;color:var(--text3);margin-top:4px;transition:opacity .3s}
.task.expanded .task-expand-hint{opacity:0;height:0;margin:0;overflow:hidden}
.victoria-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 14px;border:none;border-radius:10px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;text-decoration:none;-webkit-tap-highlight-color:transparent}
.victoria-btn.can-do{background:linear-gradient(135deg,rgba(201,164,76,0.2),rgba(232,208,126,0.12));color:var(--gold2);border:1px solid rgba(201,164,76,0.25)}
.victoria-btn.can-do:active{transform:scale(0.97);background:linear-gradient(135deg,rgba(201,164,76,0.35),rgba(232,208,126,0.2))}
.victoria-btn.guide{background:rgba(96,165,250,0.1);color:var(--blue);border:1px solid rgba(96,165,250,0.2)}
.victoria-btn.guide:active{transform:scale(0.97);background:rgba(96,165,250,0.2)}
.task-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.tag.priority-high{background:rgba(255,107,107,0.15);color:var(--red)}
.tag.priority-med{background:rgba(251,146,60,0.15);color:var(--orange)}
.tag.priority-low{background:rgba(96,165,250,0.15);color:var(--blue)}
.tag.type-seo{background:rgba(45,212,168,0.15);color:var(--green)}
.tag.type-sales{background:rgba(201,164,76,0.15);color:var(--gold2)}
.tag.type-product{background:rgba(167,139,250,0.15);color:var(--purple)}
.tag.type-marketing{background:rgba(96,165,250,0.15);color:var(--blue)}
.tag.type-team{background:rgba(251,146,60,0.15);color:var(--orange)}

/* TASK DELETE */
.task-delete{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:16px;transition:all .2s;flex-shrink:0;opacity:0}
.task:hover .task-delete,.task:active .task-delete{opacity:1}
.task-delete:hover{color:var(--red);background:rgba(255,107,107,0.1)}

/* ADD TASK */
.add-task-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;margin-top:8px;border-radius:12px;border:1px dashed rgba(255,255,255,0.1);background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit}
.add-task-btn:hover{border-color:rgba(201,164,76,0.3);color:var(--gold2)}

/* ADD FORM */
.add-form{display:none;margin-top:8px;padding:12px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid var(--border)}
.add-form.show{display:block;animation:fadeIn .3s ease}
.add-form input,.add-form textarea,.add-form select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:8px;outline:none;transition:border-color .3s}
.add-form input:focus,.add-form textarea:focus{border-color:rgba(201,164,76,0.4)}
.add-form textarea{resize:none;height:60px}
.add-form select{appearance:none;-webkit-appearance:none}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1}
.btn{padding:10px 16px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .3s}
.btn-gold{background:linear-gradient(135deg,var(--gold1),var(--gold2));color:#0B0D17}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(11,13,23,0.95),#0B0D17);border-top:1px solid var(--border);display:flex;justify-content:center;gap:32px;padding:10px 0 calc(10px + var(--safe-bottom));z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;transition:all .3s;opacity:0.5}
.nav-item.active{opacity:1}
.nav-item .icon{font-size:22px}
.nav-item .label{font-size:10px;font-weight:600}
.nav-item.active .label{color:var(--gold2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:linear-gradient(180deg,#1C2333,#161B2E);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:24px 20px calc(20px + var(--safe-bottom));animation:slideUp .3s ease}
.modal h3{font-size:18px;font-weight:700;margin-bottom:16px}

/* FINANCE VIEW */
.finance-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.finance-card h4{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.finance-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.finance-row:last-child{border-bottom:none}
.finance-row .label{color:var(--text2);font-size:13px}
.finance-row .value{font-weight:700;font-size:14px}
.finance-row .value.green{color:var(--green)}
.finance-row .value.red{color:var(--red)}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card-solid);border:1px solid var(--border);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#0B0D17;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease}
@keyframes pulseGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size:60px;animation:pulseGlow 1.5s ease infinite">🚀</div>
  <div style="margin-top:16px;font-size:28px;font-weight:900;background:linear-gradient(135deg,#C9A44C,#E8D07E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:0;animation:fadeIn .6s ease .3s forwards">PABLIKI</div>
  <div style="margin-top:4px;font-size:13px;color:#7B8394;opacity:0;animation:fadeIn .6s ease .6s forwards">Growth Roadmap</div>
</div>

<div class="container" id="app"></div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="switchView('roadmap')"><span class="icon">🗺️</span><span class="label">Roadmap</span></div>
  <div class="nav-item" onclick="switchView('finance')"><span class="icon">💰</span><span class="label">Экономика</span></div>
  <div class="nav-item" onclick="switchView('settings')"><span class="icon">⚙️</span><span class="label">Ещё</span></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== DATA =====================
const DEFAULT_PHASES = [
  {

      {id:'t2',title:'Починить robots.txt',desc:'Заменить your-production-domain.com на pabliki.kz',tags:['priority-high','type-seo'],done:false},

      {id:'t9',title:'Калькулятор рекламной кампании',desc:'Город + ниша + бюджет → готовый медиаплан с прогнозом охвата',tags:['priority-high','type-product'],done:false},

  },
  {
    id:'p3',name:'МАСШТАБИРОВАНИЕ',icon:'📈',color:'#A78BFA',months:'Месяц 5-6',
    tasks:[

t25:`<h5>📣 Как внедрить</h5>

<div class="tip">💡 Категорийный маркетинг из «Play Bigger». Повторяй пока это не станет «общеизвестным фактом».</div>`,

t26:`<h5>📄 Структура отчёта</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Автоматическая генерация PDF через 7 дней после размещения</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Метрики: охват, просмотры, вовлечённость, клики (если UTM)</div></div>

<div class="tip">💡 Отчёт = апсейл на повторное размещение. Клиент видит результат → хочет ещё.</div>`,

t27:`<h5>⭐ Как реализовать</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">После каждого размещения — клиент оценивает паблик (1-5 звёзд)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Показывать: средний охват, скорость публикации, качество контента</div></div>

<div class="tip">💡 Как Booking для отелей. Клиент доверяет рейтингам → проще принять решение.</div>`,

t28:`<h5>🎤 Как провести</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Формат: вебинар 60 мин, бесплатный, запись в YouTube</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Тема: «Городские паблики в медиамиксе: кейсы, цифры, интеграция»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Пригласить 50 агентств через LinkedIn + Instagram + email</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">В конце: «Первым 10 агентствам — бесплатный пилот для вашего клиента»</div></div>
<div class="tip">💡 Образовательный маркетинг. Агентства начнут включать Pabliki в медиапланы своих клиентов.</div>`,

t29:`<h5>🚀 Шаги</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Связаться с Astana Hub / MOST Hub — предложить партнёрство</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Формат: бесплатный пилот для 10 стартапов из инкубатора</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Взамен: статус «Партнёр экосистемы» + доступ к мероприятиям</div></div>
<div class="tip">💡 Стартапы растут → бюджеты растут → долгосрочные клиенты. Плюс PR и нетворкинг.</div>`,

t30:`<h5>🎯 Как достичь</h5>
<p>Микс каналов к концу 4-го месяца:</p>
<ul>
<li><b>10-15</b> заказов — SDR (холодные продажи)</li>
<li><b>5-10</b> заказов — входящие с сайта (калькулятор, квиз)</li>
<li><b>3-5</b> заказов — первые агентства</li>
<li><b>2-5</b> заказов — повторные клиенты из «Первой сотни»</li>
</ul>
<div class="tip">💡 20-30 заказов × 1М₸ = 20-30М₸ выручки. Уже серьёзный бизнес.</div>`,

t40:`<h5>📝 Стратегия</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Нанять копирайтера или использовать AI для драфтов + ручная доработка</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Приоритет: статьи по городам («реклама в [город] 2026») — низкая конкуренция</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Каждая статья: 1500-2000 слов, уникальные данные из базы Pabliki, CTA на калькулятор</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Внутренняя перелинковка: каждая статья ссылается на 3-5 других</div></div>
<div class="tip">💡 SEO = бесплатный трафик через 3-6 месяцев. 30 статей могут давать 5000-10000 визитов/мес.</div>`,

t41:`<h5>🎯 Тактика</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Из 50 целевых агентств к этому моменту должны быть активны 20+</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Еженедельный дайджест для партнёров: новые паблики, акции, кейсы</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Рейтинг партнёров: топ-3 получают бонусы (повышенная комиссия, эксклюзив)</div></div>
<div class="tip">💡 20 агентств × 3 заказа/мес = 60 заказов. Это уже 60% от цели.</div>`,

t42:`<h5>👥 Кого нанять</h5>
<div class="step"><div class="step-num">1</div><div class="step-text"><b>SDR #2:</b> дублирует первого, другой сегмент (другие города или ниши)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text"><b>AE (Account Executive):</b> закрывает сделки, проводит презентации, делает КП. ЗП: 300-500К₸ + % от сделок</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">SDR находит и квалифицирует → AE проводит встречу и закрывает</div></div>
<div class="tip">💡 Разделение ролей из «Predictable Revenue»: SDR не должен закрывать, AE не должен искать.</div>`,

t43:`<h5>💰 Структура</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Предложение: 12 ежемесячных размещений по фиксированной цене</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Скидка 25% от разового прайса</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Оплата: помесячно или поквартально (не сразу за год)</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Бонус: персональный менеджер + приоритетные слоты</div></div>
<div class="tip">💡 Годовой контракт = предсказуемая выручка + высокий retention. Билборды именно так продаются.</div>`,

t44:`<h5>⚡ Концепция</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Клиент загружает 2 варианта креатива (текст или картинку)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Система размещает вариант А в одних пабликах, вариант Б — в других</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Через 48 часов: отчёт — какой креатив дал больше охвата/кликов</div></div>
<div class="tip">💡 Фича уровня Facebook Ads Manager. Ни один конкурент в КЗ этого не предлагает.</div>`,

t45:`<h5>🔧 Что нужно</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">REST API: создание заказа, получение статуса, отчёты</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Webhook: уведомления при публикации и обновлении статистики</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Документация: Swagger/OpenAPI + примеры на Python/JS</div></div>
<div class="tip">💡 API — ключ к масштабированию через агентства. Они интегрируют Pabliki в свои CRM.</div>`,

t46:`<h5>🎤 Подготовка</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Подать заявку на спикера за 3 месяца (digital-bridge.kz)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Тема: «Почему 80% рекламных бюджетов в КЗ сливаются на билборды, которые никто не считает»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Подготовить: данные из собственной аналитики, 3 кейса с цифрами, сравнение ROI</div></div>
<div class="tip">💡 Одно выступление перед 500 маркетологами = 50+ лидов. Плюс запись для YouTube.</div>`,

t47:`<h5>📰 Как попасть</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Написать статью-колонку: 3000-4000 знаков, с данными и кейсами</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Отправить в Forbes.kz редактору раздела «Технологии» или «Маркетинг»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Альтернатива: Курсив.kz, Kapital.kz, Informburo</div></div>
<div class="tip">💡 Бесплатный PR. Forbes = статус и доверие. Ссылку можно использовать в КП: «О нас писал Forbes».</div>`,

t48:`<h5>🏆 Механика</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">3+ размещения → скидка 10% на все следующие</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">6+ → скидка 15% + приоритетные слоты в топ-пабликах</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">12+ → VIP-статус: персональный менеджер, бета-доступ к новым фичам, эксклюзивные паблики</div></div>
<div class="tip">💡 Удержание дешевле привлечения в 5-7 раз. Лояльный клиент = повторные заказы без маркетинговых затрат.</div>`,

t49:`<h5>🎯 Декомпозиция</h5>
<ul>
<li><b>20-25</b> заказов — SDR (2 человека × 10-12 сделок)</li>
<li><b>15-20</b> заказов — агентства (20+ партнёров)</li>
<li><b>10-15</b> заказов — входящие (SEO + контент + калькулятор)</li>
<li><b>5-10</b> заказов — повторные клиенты</li>
</ul>
<div class="tip">💡 50-70 заказов × 1М₸ = 50-70М₸ выручки. Чистая прибыль ~18-26М₸/мес.</div>`,

t60:`<h5>🍽️ Стратегия ниши</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Составить список всех ресторанов/кафе Алматы с Instagram (200-300 заведений)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Предложить первым 10 — пилот со скидкой 50%</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Собрать кейсы → показать остальным: «Вот что получили ваши соседи»</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Когда 50+ ресторанов → это стандарт отрасли. «Все так делают»</div></div>
<div class="tip">💡 Из «Crossing the Chasm»: доминируй в нише, потом расширяйся. HoReCa Алматы — идеальная первая ниша.</div>`,

t61:`<h5>📋 Порядок ниш</h5>
<div class="step"><div class="step-num">1</div><div class="step-text"><b>HoReCa</b> (рестораны, кафе) — высокая частота, средний чек</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text"><b>Стоматологии</b> — высокий LTV, много сетей</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text"><b>Фитнес</b> — сезонный спрос, но агрессивный маркетинг</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text"><b>Автодилеры</b> — большие бюджеты, долгий цикл сделки</div></div>
<div class="step"><div class="step-num">5</div><div class="step-text"><b>Застройщики</b> — максимальные бюджеты, годовые контракты</div></div>
<div class="tip">💡 Каждая новая ниша = новый кейс = новый аргумент для следующей ниши. Эффект снежного кома.</div>`,

t62:`<h5>📊 Как сделать</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Собрать данные из собственной аналитики: какие города самые активные, какие ниши</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Оформить в PDF: инфографика, карты, рейтинги</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Разослать медиа: Forbes.kz, Курсив, Telegram-каналы маркетологов</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Публиковать ежеквартально → ждать от журналистов</div></div>
<div class="tip">💡 PR через данные — из «Newsjacking». Медиа любят эксклюзивную аналитику и публикуют бесплатно.</div>`,

t63:`<h5>🏦 Как подойти</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Связаться с отделом МСБ Kaspi / Halyk / Forte</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Предложение: «Бесплатная реклама в городских пабликах при открытии бизнес-счёта»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Банк получает: ценность для клиентов. Pabliki получает: трафик + статус партнёра банка</div></div>
<div class="tip">💡 Логотип «Партнёр Kaspi Business» на сайте = мгновенное доверие.</div>`,

t64:`<h5>👤 Профиль AM</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Опыт: аккаунт-менеджмент в digital/рекламе</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Задачи: ведение клиентов, upsell (повторные волны, новые города), предотвращение оттока</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">KPI: retention 80%+, upsell 30% клиентов, NPS 60+</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">ЗП: 300-400К₸ + бонус от повторных заказов</div></div>
<div class="tip">💡 AM окупается с первого удержанного клиента. Один сохранённый годовой контракт = 12М₸.</div>`,

t65:`<h5>🏷️ Как работает</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Агентство заходит в Pabliki под своим логотипом и цветами</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Клиент видит «MediaPlan by [Агентство]», а не Pabliki</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Агентство ставит свою наценку сверху → все зарабатывают</div></div>
<div class="tip">💡 White-label = агентство не боится, что клиент уйдёт напрямую. Снимает главный барьер.</div>`,

t66:`<h5>⚡ Механика</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Клиент нажимает «Срочное размещение» → наценка +20% автоматически</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Оператор получает приоритетное уведомление → публикация в течение 24 часов</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Идеально для: запуски продуктов, мероприятия, кризисный PR, флеш-акции</div></div>
<div class="tip">💡 Организаторы концертов / фестивалей — идеальные клиенты для этой опции. Им нужен охват за 1-2 дня.</div>`,

t67:`<h5>🏆 Финальная формула</h5>

<li><b>40</b> заказов — входящие (SEO + контент + калькулятор + бот)</li>

function victoriaAction(taskId, title, type) {

  window.open(url, '_blank');

}

// ===================== RENDER =====================
function render(){
  const app = document.getElementById('app');
  if(currentView === 'roadmap') renderRoadmap(app);
  else if(currentView === 'finance') renderFinance(app);
  else renderSettings(app);
  updateNav();
}

function renderRoadmap(app){
  const allTasks = getAllTasks();
  const filtered = currentFilter === 'all' ? allTasks : allTasks.filter(t => t.tags && t.tags.some(tag => tag === 'type-'+currentFilter));
  const done = filtered.filter(t=>t.done).length;
  const total = filtered.length;
  const pct = total ? Math.round(done/total*100) : 0;

  const pending = allTasks.filter(t=>!t.done).length;
  const completed = allTasks.filter(t=>t.done).length;

  let html = `
    <div class="header">
      <h1>PABLIKI GROWTH</h1>
      <p>Roadmap → 100 заказов × 1 000 000₸</p>
    </div>
    <div class="progress-section">
      <div class="progress-header">
        <span>Общий прогресс</span>
        <strong>${pct}%</strong>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="stats">
      <div class="stat green"><div class="num">${completed}</div><div class="label">Выполнено</div></div>
      <div class="stat orange"><div class="num">${pending}</div><div class="label">Осталось</div></div>
      <div class="stat blue"><div class="num">${allTasks.length}</div><div class="label">Всего</div></div>
    </div>
    <div class="tabs">
      <div class="tab ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">Все</div>
      <div class="tab ${currentFilter==='seo'?'active':''}" onclick="setFilter('seo')">SEO</div>
      <div class="tab ${currentFilter==='sales'?'active':''}" onclick="setFilter('sales')">Продажи</div>
      <div class="tab ${currentFilter==='marketing'?'active':''}" onclick="setFilter('marketing')">Маркетинг</div>
      <div class="tab ${currentFilter==='product'?'active':''}" onclick="setFilter('product')">Продукт</div>
      <div class="tab ${currentFilter==='team'?'active':''}" onclick="setFilter('team')">Команда</div>
    </div>
  `;

  state.phases.forEach(phase => {
    const phaseTasks = currentFilter === 'all' ? phase.tasks : phase.tasks.filter(t => t.tags && t.tags.some(tag => tag === 'type-'+currentFilter));
    if(phaseTasks.length === 0) return;
    const pd = phaseTasks.filter(t=>t.done).length;
    const pt = phaseTasks.length;
    const isOpen = phase._open !== false;
    html += `
      <div class="phase ${isOpen?'open':''}">
        <div class="phase-header" onclick="togglePhase('${phase.id}')">
          <div class="phase-icon" style="background:${phase.color}22">${phase.icon}</div>
          <div class="phase-info">
            <h3>${phase.name}</h3>
            <div class="meta">${phase.months} • ${pd}/${pt} задач</div>
          </div>
          <div class="phase-progress" style="color:${phase.color}">${Math.round(pd/pt*100)}%</div>
          <div class="phase-chevron">▼</div>
        </div>
        <div class="phase-body">
          ${phaseTasks.map(t => renderTask(t, phase.id)).join('')}
          <button class="add-task-btn" onclick="showAddForm('${phase.id}')">+ Добавить задачу</button>
          <div class="add-form" id="form-${phase.id}">
            <input type="text" id="input-title-${phase.id}" placeholder="Название задачи">
            <textarea id="input-desc-${phase.id}" placeholder="Описание (опционально)"></textarea>
            <div class="form-row">
              <select id="input-priority-${phase.id}">
                <option value="priority-high">🔴 Высокий</option>
                <option value="priority-med">🟡 Средний</option>
                <option value="priority-low">🔵 Низкий</option>
              </select>
              <select id="input-type-${phase.id}">
                <option value="type-sales">💰 Продажи</option>
                <option value="type-marketing">📣 Маркетинг</option>
                <option value="type-seo">🔍 SEO</option>
                <option value="type-product">⚡ Продукт</option>
                <option value="type-team">👥 Команда</option>
              </select>
            </div>
            <div class="form-row" style="margin-top:4px">
              <button class="btn btn-gold" onclick="addTask('${phase.id}')">Добавить</button>
              <button class="btn btn-ghost" onclick="hideAddForm('${phase.id}')">Отмена</button>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  app.innerHTML = html;
}

function renderTask(t, phaseId){
  const tagsHtml = (t.tags||[]).map(tag => {
    const labels = {'priority-high':'Высокий','priority-med':'Средний','priority-low':'Низкий','type-seo':'SEO','type-sales':'Продажи','type-product':'Продукт','type-marketing':'Маркетинг','type-team':'Команда'};
    return `<span class="tag ${tag}">${labels[tag]||tag}</span>`;
  }).join('');
  const howto = HOWTO[t.id] || t.howto || '';
  const isExpanded = expandedTasks[t.id];
  const vType = VICTORIA_TASKS[t.id];
  const vBtn = vType && !t.done ? `<button class="victoria-btn ${vType === 'do' ? 'can-do' : 'guide'}" onclick="event.stopPropagation();victoriaAction('${t.id}',\`${t.title.replace(/`/g,"'")}\`,'${vType}')">${VICTORIA_LABELS[vType]}</button>` : '';
  return `
    <div class="task ${t.done?'done':''} ${isExpanded?'expanded':''}">
      <div class="task-check" onclick="toggleTask('${phaseId}','${t.id}')"></div>
      <div class="task-content" onclick="toggleExpand('${t.id}')">
        <div class="task-title">${t.title}</div>
        ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
        <div class="task-tags">${tagsHtml}</div>
        ${vBtn}
        ${howto ? '<div class="task-expand-hint">▼ Нажми — как реализовать</div>' : ''}
        ${howto ? `<div class="task-howto">${howto}</div>` : ''}
      </div>
      <div class="task-delete" onclick="deleteTask('${phaseId}','${t.id}')">✕</div>
    </div>
  `;
}

// ===================== ACTIONS =====================
function getAllTasks(){
  let all = [];
  state.phases.forEach(p => all.push(...p.tasks));
  return all;
}

function togglePhase(id){
  const phase = state.phases.find(p=>p.id===id);
  if(phase) phase._open = phase._open === false ? true : false;
  saveState(); render();
}

function toggleExpand(taskId){
  expandedTasks[taskId] = !expandedTasks[taskId];
  render();
}

function toggleTask(phaseId, taskId){
  const phase = state.phases.find(p=>p.id===phaseId);
  if(!phase) return;
  const task = phase.tasks.find(t=>t.id===taskId);
  if(!task) return;
  task.done = !task.done;
  saveState(); render();
  if(task.done) showToast('✅ Выполнено!');
}

function deleteTask(phaseId, taskId){
  if(!confirm('Удалить задачу?')) return;
  const phase = state.phases.find(p=>p.id===phaseId);
  if(!phase) return;
  phase.tasks = phase.tasks.filter(t=>t.id!==taskId);
  saveState(); render();
  showToast('🗑 Удалено');
}

function showAddForm(phaseId){
  document.getElementById('form-'+phaseId).classList.add('show');
}
function hideAddForm(phaseId){
  document.getElementById('form-'+phaseId).classList.remove('show');
}

function addTask(phaseId){
  const title = document.getElementById('input-title-'+phaseId).value.trim();
  if(!title){showToast('Введите название');return;}
  const desc = document.getElementById('input-desc-'+phaseId).value.trim();
  const priority = document.getElementById('input-priority-'+phaseId).value;
  const type = document.getElementById('input-type-'+phaseId).value;
  const phase = state.phases.find(p=>p.id===phaseId);
  if(!phase) return;
  phase.tasks.push({
    id: 'c'+Date.now(),
    title, desc,
    tags: [priority, type],
    done: false
  });
  saveState(); render();
  showToast('✅ Задача добавлена');
}

function setFilter(f){
  currentFilter = f;
  render();
}

function switchView(view){
  currentView = view;
  render();
  window.scrollTo(0,0);
}

function updateNav(){
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    const views = ['roadmap','finance','settings'];
    el.classList.toggle('active', views[i]===currentView);
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function closeModal(e){
  if(e.target.id==='modalOverlay') document.getElementById('modalOverlay').classList.remove('show');
}

// ===================== DATA MANAGEMENT =====================
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pabliki-roadmap-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('📥 Экспорт сохранён');
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      state = JSON.parse(ev.target.result);
      saveState(); render();
      showToast('📤 Импорт выполнен');
    }catch(err){
      showToast('❌ Ошибка файла');
    }
  };
  reader.readAsText(file);
}

function resetData(){
  if(!confirm('Сбросить все данные? Прогресс будет потерян.')) return;
  if(!confirm('Точно уверен?')) return;
  state = {phases: JSON.parse(JSON.stringify(DEFAULT_PHASES)), customTasks:[], version:2};
  saveState(); render();
  showToast('🗑 Данные сброшены');
}

// ===================== INIT =====================
window.addEventListener('load', () => {
  setTimeout(() => {
    const s = document.getElementById('splash');
    if(s){s.style.opacity='0'; setTimeout(()=>s.remove(), 600);}
  }, 1500);
  render();
});
</script>
