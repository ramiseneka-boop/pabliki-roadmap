<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1e1e2e" id="themeMetaColor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<title>Pabliki Growth — Roadmap</title>
<script src="pabliki-data.js"></script>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ======================== CATPPUCCIN THEME ======================== */
:root{
  --radius:6px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* DARK — Catppuccin Mocha */
[data-theme="dark"]{
  --bg:oklch(0.2155 0.0254 284.0647);
  --bg2:oklch(0.2429 0.0304 283.9110);
  --surface:oklch(0.2973 0.0294 276.2144);
  --text:oklch(0.8787 0.0426 272.2767);
  --text2:oklch(0.7510 0.0396 273.9320);
  --text3:oklch(0.5500 0.0340 278);
  --border:oklch(0.3240 0.0319 281.9784);
  --primary:oklch(0.7400 0.1400 230);
  --primary-fg:oklch(0.2429 0.0304 283.9110);
  --accent:oklch(0.8467 0.0833 210.2545);
  --accent-fg:oklch(0.2429 0.0304 283.9110);
  --green:oklch(0.8577 0.1092 142.7153);
  --red:oklch(0.7556 0.1297 2.7642);
  --peach:oklch(0.8237 0.1015 52.6294);
  --yellow:oklch(0.8870 0.0979 84.3);
  --blue:oklch(0.7400 0.1200 240);
  --chart1:oklch(0.7400 0.1400 230);
  --chart2:oklch(0.8467 0.0833 210.2545);
  --chart3:oklch(0.8577 0.1092 142.7153);
  --chart4:oklch(0.8237 0.1015 52.6294);
  --shadow:0px 4px 6px 0px hsl(240 30% 25% / 0.12);
  --card-bg:oklch(0.2429 0.0304 283.9110);
  --input-bg:oklch(0.2973 0.0294 276.2144);
}

/* LIGHT — Catppuccin Latte */
[data-theme="light"]{
  --bg:oklch(0.9578 0.0058 264.5321);
  --bg2:oklch(1.0000 0 0);
  --surface:oklch(0.9060 0.0117 264.5071);
  --text:oklch(0.4355 0.0430 279.3250);
  --text2:oklch(0.5471 0.0343 279.0837);
  --text3:oklch(0.7000 0.0200 270);
  --border:oklch(0.8083 0.0174 271.1982);
  --primary:oklch(0.5800 0.1800 235);
  --primary-fg:oklch(1.0000 0 0);
  --accent:oklch(0.6820 0.1448 235.3822);
  --accent-fg:oklch(1.0000 0 0);
  --green:oklch(0.6250 0.1772 140.4448);
  --red:oklch(0.5505 0.2155 19.8095);
  --peach:oklch(0.6920 0.2041 42.4293);
  --yellow:oklch(0.6800 0.1500 80);
  --blue:oklch(0.5800 0.1800 240);
  --chart1:oklch(0.5800 0.1800 235);
  --chart2:oklch(0.6820 0.1448 235.3822);
  --chart3:oklch(0.6250 0.1772 140.4448);
  --chart4:oklch(0.6920 0.2041 42.4293);
  --shadow:0px 4px 6px 0px hsl(240 30% 25% / 0.08);
  --card-bg:oklch(1.0000 0 0);
  --input-bg:oklch(0.9060 0.0117 264.5071);
}

/* ======================== BASE ======================== */
html{font-family:'Montserrat',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;transition:background .3s,color .3s}
body{min-height:100vh;background:var(--bg);padding:0;overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:calc(80px + var(--safe-bottom));transition:background .3s}

/* ======================== SPLASH ======================== */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash h2{font-size:22px;font-weight:800;color:var(--primary);letter-spacing:2px}
#splash p{color:var(--text2);font-size:12px;margin-top:8px}

#app{max-width:480px;margin:0 auto;padding:24px 16px}

/* ======================== HEADER ======================== */
.header{text-align:center;padding:16px 0 20px}
.header h1{font-size:28px;font-weight:900;letter-spacing:2px;color:var(--primary)}
.header p{font-size:13px;color:var(--text2);margin-top:4px}

/* ======================== THEME TOGGLE ======================== */
.theme-toggle{position:fixed;top:calc(16px + var(--safe-top));right:16px;z-index:100;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--card-bg);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .3s;box-shadow:var(--shadow)}
.theme-toggle:active{transform:scale(0.9)}

/* ======================== PROGRESS ======================== */
.progress-section{margin-bottom:20px}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;color:var(--text2)}
.progress-header strong{font-size:22px;color:var(--primary);font-weight:800}
.progress-bar{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .5s ease}

/* ======================== STATS ======================== */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{text-align:center;padding:14px 8px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius)}
.stat .num{font-size:24px;font-weight:800;line-height:1}
.stat .label{font-size:10px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.stat.green .num{color:var(--green)}
.stat.orange .num{color:var(--peach)}
.stat.blue .num{color:var(--accent)}

/* ======================== TABS ======================== */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:var(--radius);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .2s;color:var(--text2);background:var(--card-bg);border:1px solid var(--border)}
.tab.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
.tab:active{transform:scale(0.96)}

/* ======================== PHASE ======================== */
.phase{margin-bottom:16px}
.phase-header{display:flex;align-items:center;gap:12px;padding:16px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.phase-header:active{transform:scale(0.99)}
.phase-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.phase-info{flex:1;min-width:0}
.phase-info h3{font-size:14px;font-weight:800;letter-spacing:0.5px;color:var(--text)}
.phase-info .meta{font-size:11px;color:var(--text2);margin-top:2px}
.phase-progress{font-size:14px;font-weight:700;flex-shrink:0}
.phase-chevron{color:var(--text3);transition:transform .3s;flex-shrink:0}
.phase.open .phase-chevron{transform:rotate(180deg)}

.phase-body{background:var(--card-bg);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;display:none;padding:8px 16px 16px}
.phase.open .phase-body{display:block}

/* ======================== TASK ======================== */
.task{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);transition:opacity .3s}
.task:last-of-type{border-bottom:none}
.task.done{opacity:0.5}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;transition:all .2s;margin-top:2px;display:flex;align-items:center;justify-content:center}
.task-check:active{transform:scale(0.85)}
.task.done .task-check{background:var(--green);border-color:var(--green)}
.task.done .task-check::after{content:'✓';color:var(--bg);font-size:12px;font-weight:700}
.task-content{flex:1;min-width:0;cursor:pointer}
.task-title{font-size:14px;font-weight:600;line-height:1.4;color:var(--text)}
.task.done .task-title{text-decoration:line-through;color:var(--text2)}
.task-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-top:4px}
.task-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.tag.priority-high{background:oklch(from var(--red) l c h / 0.15);color:var(--red)}
.tag.priority-med{background:oklch(from var(--yellow) l c h / 0.15);color:var(--yellow)}
.tag.priority-low{background:oklch(from var(--blue) l c h / 0.15);color:var(--blue)}
.tag.type-seo{background:oklch(from var(--accent) l c h / 0.15);color:var(--accent)}
.tag.type-sales{background:oklch(from var(--green) l c h / 0.15);color:var(--green)}
.tag.type-product{background:oklch(from var(--peach) l c h / 0.15);color:var(--peach)}
.tag.type-marketing{background:oklch(from var(--primary) l c h / 0.15);color:var(--primary)}
.tag.type-team{background:oklch(from var(--chart4) l c h / 0.15);color:var(--chart4)}
.task-delete{color:var(--text3);font-size:14px;cursor:pointer;padding:4px;opacity:0.5;transition:all .2s;flex-shrink:0}
.task-delete:active{opacity:1;color:var(--red)}

/* ======================== HOWTO EXPAND ======================== */
.task-howto{display:none;margin-top:10px;padding:12px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);font-size:12.5px;color:var(--text2);line-height:1.7}
.task.expanded .task-howto{display:block;animation:fadeIn .3s ease}
.task-howto h5{color:var(--primary);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.task-howto p{margin-bottom:8px}
.task-howto ul{margin:6px 0 10px 16px}
.task-howto li{margin-bottom:4px}
.task-howto .step{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.task-howto .step-num{width:22px;height:22px;border-radius:7px;background:oklch(from var(--primary) l c h / 0.15);color:var(--primary);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-howto .step-text{flex:1;color:var(--text)}
.task-howto .tip{margin-top:8px;padding:8px 10px;background:oklch(from var(--green) l c h / 0.1);border-radius:var(--radius);border-left:3px solid var(--green);font-size:11.5px;color:var(--green)}
.task-expand-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 14px;border:1px solid var(--accent);border-radius:var(--radius);background:transparent;color:var(--accent);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.task-expand-btn:active{transform:scale(0.97);background:var(--surface)}
.task.expanded .task-expand-btn{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.task-expand-btn .chevron{transition:transform .2s;display:inline-block}
.task.expanded .task-expand-btn .chevron{transform:rotate(180deg)}

/* ======================== VICTORIA BUTTONS ======================== */
.victoria-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 14px;border:none;border-radius:var(--radius);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;text-decoration:none;-webkit-tap-highlight-color:transparent}
.victoria-btn.can-do{background:oklch(from var(--primary) l c h / 0.15);color:var(--primary);border:1px solid oklch(from var(--primary) l c h / 0.25)}
.victoria-btn.can-do:active{transform:scale(0.97);background:oklch(from var(--primary) l c h / 0.25)}
.victoria-btn.guide{background:oklch(from var(--accent) l c h / 0.1);color:var(--accent);border:1px solid oklch(from var(--accent) l c h / 0.2)}
.victoria-btn.guide:active{transform:scale(0.97);background:oklch(from var(--accent) l c h / 0.2)}

/* ======================== ADD FORM ======================== */
.add-task-btn{width:100%;padding:12px;border:1px dashed var(--border);border-radius:var(--radius);background:transparent;color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;margin-top:8px}
.add-task-btn:active{background:var(--surface)}
.add-form{display:none;padding:12px 0}
.add-form.show{display:block}
.add-form input,.add-form textarea,.add-form select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--input-bg);color:var(--text);font-size:14px;font-family:inherit;margin-bottom:8px;transition:border-color .2s}
.add-form input:focus,.add-form textarea:focus,.add-form select:focus{outline:none;border-color:var(--primary)}
.add-form textarea{min-height:60px;resize:vertical}
.form-row{display:flex;gap:8px}
.form-row select{flex:1}

/* ======================== BUTTONS ======================== */
.btn{padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;border:none}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--primary);color:var(--primary-fg)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}

/* ======================== FINANCE ======================== */
.finance-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.finance-card h4{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.finance-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.finance-row .label{color:var(--text2)}
.finance-row .value{font-weight:700;color:var(--text)}
.finance-row .value.green{color:var(--green)}
.finance-row .value.red{color:var(--red)}

/* ======================== NAV ======================== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card-bg);border-top:1px solid var(--border);display:flex;justify-content:center;gap:0;padding:8px 0 calc(8px + var(--safe-bottom));z-index:50;transition:background .3s}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 24px;cursor:pointer;transition:color .2s;color:var(--text3)}
.nav-item.active{color:var(--primary)}
.nav-item .icon{font-size:20px}
.nav-item .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}

/* ======================== TOAST / MODAL ======================== */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:var(--radius);font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:200;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:360px;width:90%;box-shadow:var(--shadow)}

/* ======================== ANIMATIONS ======================== */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ======================== SELECTION / ПОДБОРКА ======================== */
.filter-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.filter-section h4{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text)}
.filter-row{margin-bottom:12px}
.filter-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
.filter-label span{color:var(--primary);font-weight:700}
.city-chips{display:flex;flex-wrap:wrap;gap:6px}
.city-chip{padding:6px 10px;border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;transition:all .15s;-webkit-tap-highlight-color:transparent}
.city-chip.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}
.city-chip:active{transform:scale(0.95)}
input[type=range]{width:100%;height:4px;border-radius:2px;outline:none;-webkit-appearance:none;background:var(--surface);margin:8px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid var(--card-bg)}
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.mode-btn{flex:1;padding:10px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:inherit;transition:all .2s}
.mode-btn.active{background:var(--primary);color:var(--primary-fg)}
.sel-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:12px}
.sel-table th{text-align:left;padding:8px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--primary);border-bottom:2px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--card-bg);z-index:2}
.sel-table td{padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.sel-table td:first-child{color:var(--text);font-weight:600}
.sel-table tr:last-child td{border-bottom:none}
.sel-table .num{text-align:right;font-variant-numeric:tabular-nums}
.sel-table .ig-link{color:var(--accent);text-decoration:none;font-weight:600}
.sel-table .ig-link:active{opacity:0.7}
.sel-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.sel-check.checked{background:var(--primary);border-color:var(--primary)}
.sel-check.checked::after{content:'✓';color:var(--primary-fg);font-size:11px;font-weight:700}
.sel-total{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.sel-total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.sel-total-row .label{color:var(--text2)}
.sel-total-row .val{font-weight:700;color:var(--text)}
.sel-total-row .val.green{color:var(--green)}
.sel-actions{display:flex;gap:8px;margin-bottom:16px}
.sel-actions .btn{flex:1;font-size:12px;padding:12px}
.table-wrap{overflow-x:auto;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);max-height:50vh;overflow-y:auto}
.sel-count{font-size:12px;color:var(--text2);margin-bottom:8px;text-align:center}
.sel-count strong{color:var(--primary)}

/* Tag fallback for browsers without oklch relative */
@supports not (background: oklch(from red l c h / 0.5)) {
  .tag.priority-high{background:rgba(210,80,80,0.15);color:#d25050}
  .tag.priority-med{background:rgba(200,170,50,0.15);color:#c8aa32}
  .tag.priority-low{background:rgba(80,130,210,0.15);color:#5082d2}
  .tag.type-seo{background:rgba(100,180,200,0.15);color:#64b4c8}
  .tag.type-sales{background:rgba(80,200,140,0.15);color:#50c88c}
  .tag.type-product{background:rgba(210,150,80,0.15);color:#d29650}
  .tag.type-marketing{background:rgba(160,100,220,0.15);color:#a064dc}
  .tag.type-team{background:rgba(210,150,80,0.15);color:#d29650}
  .victoria-btn.can-do{background:rgba(160,100,220,0.15);color:#a064dc;border:1px solid rgba(160,100,220,0.3)}
  .victoria-btn.guide{background:rgba(100,180,200,0.12);color:#64b4c8;border:1px solid rgba(100,180,200,0.25)}
  .task-howto .step-num{background:rgba(160,100,220,0.15);color:#a064dc}
  .task-howto .tip{background:rgba(80,200,140,0.1)}
}
</style>
</head>
<body>

<div id="splash">
  <h2>PABLIKI GROWTH</h2>
  <p>Загрузка...</p>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div id="app"></div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="switchView('roadmap')"><span class="icon">🗺️</span><span class="label">Roadmap</span></div>
  <div class="nav-item" onclick="switchView('selection')"><span class="icon">📋</span><span class="label">Подборка</span></div>
  <div class="nav-item" onclick="switchView('finance')"><span class="icon">💰</span><span class="label">Экономика</span></div>

<p><b>🏙️ ГОРОД</b> — 1 город, 10-15 пабликов, пост+сторис, 1 волна → <b>300-500К₸</b></p>
<p><b>🌆 РЕГИОН</b> — 3-5 городов, 2 волны, аналитика → <b>800К-1.2М₸</b> (целевой пакет)</p>
<p><b>🇰🇿 КАЗАХСТАН</b> — все регионы, 4 волны, менеджер → <b>2-3М₸</b></p>
<p><b>Аддоны:</b> WhatsApp-рассылка +200К, повторная волна +30%, видеопродакшн +150К, срочное (24ч) +20%</p>
<div class="tip">💡 Якорь сверху (2.5М₸) делает средний пакет (1М₸) психологически «выгодным» — эффект приманки Ариели.</div>`,

t20:`<h5>📝 План статей</h5>
<ul>
<li>«Реклама в Алматы: цены, каналы, сравнение 2026»</li>
<li>«Как рекламировать ресторан в Астане — 5 рабочих каналов»</li>
<li>«Реклама в Instagram пабликах Казахстана — полный гайд»</li>
<li>«Продвижение бизнеса в Шымкенте — что работает»</li>
<li>«Альтернатива билбордам: городские паблики»</li>
<li>«Сколько стоит реклама в пабликах — калькулятор»</li>
<li>«ТОП-10 пабликов Алматы по охвату»</li>
<li>«Как выбрать паблик для рекламы — чеклист»</li>
<li>«Кейс: 300 заявок за неделю из пабликов»</li>
<li>«Таргет vs паблики: что эффективнее для локального бизнеса»</li>
</ul>
<div class="tip">💡 Каждая статья — 1500-2000 слов, с CTA на калькулятор/квиз. SEO-трафик начнёт расти через 2-3 месяца.</div>`,

t21:`<h5>🎬 Форматы видео</h5>
<div class="step"><div class="step-num">1</div><div class="step-text"><b>Сравнение:</b> «500К на билборд vs 500К на Pabliki — результат» (60 сек)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text"><b>Обзор:</b> «Сколько стоит реклама в каждом городе КЗ» (3-5 мин)</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text"><b>Кейс:</b> «Как [бренд] получил 300 заявок за неделю» (2-3 мин)</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text"><b>Behind the scenes:</b> «Как работает Pabliki изнутри» (1-2 мин, Reels)</div></div>
<div class="step"><div class="step-num">5</div><div class="step-text"><b>Отзывы:</b> клиенты на камеру (30 сек, вертикальный формат)</div></div>
<div class="tip">💡 Один формат → нарезать для YouTube (длинный), Instagram Reels (60 сек), TikTok (30 сек).</div>`,

t22:`<h5>🤝 Запуск партнёрки</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Составить список 50 маркетинговых агентств КЗ (Алматы, Астана, Шымкент)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Подготовить презентацию: 10-20% комиссия, white-label, готовые медиапланы</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Провести 10 личных встреч / zoom-презентаций</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Дать 5 лучшим агентствам пилотный бесплатный заказ для их клиента</div></div>
<div class="step"><div class="step-num">5</div><div class="step-text">Создать Telegram-чат «Pabliki Partners» для быстрой коммуникации</div></div>
<div class="tip">💡 50 агентств × 5 клиентов = 250 потенциальных заказов/мес. Самый масштабируемый канал.</div>`,

t23:`<h5>📊 Концепция</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Бесплатный инструмент: ввести название бренда / Instagram</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Показать: «Ваш бренд видят только 12% жителей Алматы»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Сравнение с конкурентами: «А вот [конкурент] охватывает 45%»</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">CTA: «Увеличить охват до 80% → подобрать паблики»</div></div>
<div class="tip">💡 Создаёт FOMO. Клиент видит проблему, которую раньше не осознавал → мотивация к покупке.</div>`,

t24:`<h5>🤖 Архитектура бота</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Старт: «В каком городе нужна реклама?» → кнопки с городами</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">«Какая ниша?» → рестораны, клиники, авто и т.д.</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">«Бюджет?» → 300К / 500К / 1М / Свой</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Мгновенная подборка из базы → PDF</div></div>
<div class="step"><div class="step-num">5</div><div class="step-text">«Оплатить» → Kaspi Pay ссылка</div></div>
<div class="tip">💡 Казахстан = Telegram-страна. Минимальный порог входа для МСБ. Может дать 20-30% конверсии на малых чеках.</div>`,

t25:`<h5>📣 Как внедрить</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Добавить фрейм на сайт, во все КП, во все презентации</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Использовать в каждом выступлении и интервью</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">SDR в каждом звонке: «Вы используете таргет и контекст? А третий обязательный канал?»</div></div>
<p>Формула: <b>Таргет</b> (точечно) + <b>Контекст</b> (горячий спрос) + <b>Городские паблики</b> (массовый охват) = полный охват.</p>
<div class="tip">💡 Категорийный маркетинг из «Play Bigger». Повторяй пока это не станет «общеизвестным фактом».</div>`,

t26:`<h5>📄 Структура отчёта</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Автоматическая генерация PDF через 7 дней после размещения</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Метрики: охват, просмотры, вовлечённость, клики (если UTM)</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Сравнение с бенчмарками: «Ваш охват на 30% выше среднего по нише»</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Рекомендация: «Для закрепления эффекта — повторная волна через 2 недели»</div></div>
<div class="tip">💡 Отчёт = апсейл на повторное размещение. Клиент видит результат → хочет ещё.</div>`,

t27:`<h5>⭐ Как реализовать</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">После каждого размещения — клиент оценивает паблик (1-5 звёзд)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Показывать: средний охват, скорость публикации, качество контента</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Бейджи: «Топ-10 Алматы», «Быстрая публикация», «Высокий охват»</div></div>
<div class="tip">💡 Как Booking для отелей. Клиент доверяет рейтингам → проще принять решение.</div>`,

t28:`<h5>🎤 Как провести</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Формат: вебинар 60 мин, бесплатный, запись в YouTube</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Тема: «Городские паблики в медиамиксе: кейсы, цифры, интеграция»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Пригласить 50 агентств через LinkedIn + Instagram + email</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">В конце: «Первым 10 агентствам — бесплатный пилот для вашего клиента»</div></div>
<div class="tip">💡 Образовательный маркетинг. Агентства начнут включать Pabliki в медиапланы своих клиентов.</div>`,

t29:`<h5>🚀 Шаги</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Связаться с Astana Hub / MOST Hub — предложить партнёрство</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Формат: бесплатный пилот для 10 стартапов из инкубатора</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Взамен: статус «Партнёр экосистемы» + доступ к мероприятиям</div></div>
<div class="tip">💡 Стартапы растут → бюджеты растут → долгосрочные клиенты. Плюс PR и нетворкинг.</div>`,

t30:`<h5>🎯 Как достичь</h5>
<p>Микс каналов к концу 4-го месяца:</p>
<ul>
<li><b>10-15</b> заказов — SDR (холодные продажи)</li>
<li><b>5-10</b> заказов — входящие с сайта (калькулятор, квиз)</li>
<li><b>3-5</b> заказов — первые агентства</li>
<li><b>2-5</b> заказов — повторные клиенты из «Первой сотни»</li>
</ul>
<div class="tip">💡 20-30 заказов × 1М₸ = 20-30М₸ выручки. Уже серьёзный бизнес.</div>`,

t40:`<h5>📝 Стратегия</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Нанять копирайтера или использовать AI для драфтов + ручная доработка</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Приоритет: статьи по городам («реклама в [город] 2026») — низкая конкуренция</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Каждая статья: 1500-2000 слов, уникальные данные из базы Pabliki, CTA на калькулятор</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Внутренняя перелинковка: каждая статья ссылается на 3-5 других</div></div>
<div class="tip">💡 SEO = бесплатный трафик через 3-6 месяцев. 30 статей могут давать 5000-10000 визитов/мес.</div>`,

t41:`<h5>🎯 Тактика</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Из 50 целевых агентств к этому моменту должны быть активны 20+</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Еженедельный дайджест для партнёров: новые паблики, акции, кейсы</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Рейтинг партнёров: топ-3 получают бонусы (повышенная комиссия, эксклюзив)</div></div>
<div class="tip">💡 20 агентств × 3 заказа/мес = 60 заказов. Это уже 60% от цели.</div>`,

t42:`<h5>👥 Кого нанять</h5>
<div class="step"><div class="step-num">1</div><div class="step-text"><b>SDR #2:</b> дублирует первого, другой сегмент (другие города или ниши)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text"><b>AE (Account Executive):</b> закрывает сделки, проводит презентации, делает КП. ЗП: 300-500К₸ + % от сделок</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">SDR находит и квалифицирует → AE проводит встречу и закрывает</div></div>
<div class="tip">💡 Разделение ролей из «Predictable Revenue»: SDR не должен закрывать, AE не должен искать.</div>`,

t43:`<h5>💰 Структура</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Предложение: 12 ежемесячных размещений по фиксированной цене</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Скидка 25% от разового прайса</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Оплата: помесячно или поквартально (не сразу за год)</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Бонус: персональный менеджер + приоритетные слоты</div></div>
<div class="tip">💡 Годовой контракт = предсказуемая выручка + высокий retention. Билборды именно так продаются.</div>`,

t44:`<h5>⚡ Концепция</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Клиент загружает 2 варианта креатива (текст или картинку)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Система размещает вариант А в одних пабликах, вариант Б — в других</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Через 48 часов: отчёт — какой креатив дал больше охвата/кликов</div></div>
<div class="tip">💡 Фича уровня Facebook Ads Manager. Ни один конкурент в КЗ этого не предлагает.</div>`,

t45:`<h5>🔧 Что нужно</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">REST API: создание заказа, получение статуса, отчёты</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Webhook: уведомления при публикации и обновлении статистики</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Документация: Swagger/OpenAPI + примеры на Python/JS</div></div>
<div class="tip">💡 API — ключ к масштабированию через агентства. Они интегрируют Pabliki в свои CRM.</div>`,

t46:`<h5>🎤 Подготовка</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Подать заявку на спикера за 3 месяца (digital-bridge.kz)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Тема: «Почему 80% рекламных бюджетов в КЗ сливаются на билборды, которые никто не считает»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Подготовить: данные из собственной аналитики, 3 кейса с цифрами, сравнение ROI</div></div>
<div class="tip">💡 Одно выступление перед 500 маркетологами = 50+ лидов. Плюс запись для YouTube.</div>`,

t47:`<h5>📰 Как попасть</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Написать статью-колонку: 3000-4000 знаков, с данными и кейсами</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Отправить в Forbes.kz редактору раздела «Технологии» или «Маркетинг»</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Альтернатива: Курсив.kz, Kapital.kz, Informburo</div></div>
<div class="tip">💡 Бесплатный PR. Forbes = статус и доверие. Ссылку можно использовать в КП: «О нас писал Forbes».</div>`,

t48:`<h5>🏆 Механика</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">3+ размещения → скидка 10% на все следующие</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">6+ → скидка 15% + приоритетные слоты в топ-пабликах</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">12+ → VIP-статус: персональный менеджер, бета-доступ к новым фичам, эксклюзивные паблики</div></div>
<div class="tip">💡 Удержание дешевле привлечения в 5-7 раз. Лояльный клиент = повторные заказы без маркетинговых затрат.</div>`,

t49:`<h5>🎯 Декомпозиция</h5>
<ul>
<li><b>20-25</b> заказов — SDR (2 человека × 10-12 сделок)</li>
<li><b>15-20</b> заказов — агентства (20+ партнёров)</li>
<li><b>10-15</b> заказов — входящие (SEO + контент + калькулятор)</li>
<li><b>5-10</b> заказов — повторные клиенты</li>
</ul>
<div class="tip">💡 50-70 заказов × 1М₸ = 50-70М₸ выручки. Чистая прибыль ~18-26М₸/мес.</div>`,

t60:`<h5>🍽️ Стратегия ниши</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Составить список всех ресторанов/кафе Алматы с Instagram (200-300 заведений)</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Предложить первым 10 — пилот со скидкой 50%</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Собрать кейсы → показать остальным: «Вот что получили ваши соседи»</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Когда 50+ ресторанов → это стандарт отрасли. «Все так делают»</div></div>
<div class="tip">💡 Из «Crossing the Chasm»: доминируй в нише, потом расширяйся. HoReCa Алматы — идеальная первая ниша.</div>`,

t61:`<h5>📋 Порядок ниш</h5>
<div class="step"><div class="step-num">1</div><div class="step-text"><b>HoReCa</b> (рестораны, кафе) — высокая частота, средний чек</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text"><b>Стоматологии</b> — высокий LTV, много сетей</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text"><b>Фитнес</b> — сезонный спрос, но агрессивный маркетинг</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text"><b>Автодилеры</b> — большие бюджеты, долгий цикл сделки</div></div>
<div class="step"><div class="step-num">5</div><div class="step-text"><b>Застройщики</b> — максимальные бюджеты, годовые контракты</div></div>
<div class="tip">💡 Каждая новая ниша = новый кейс = новый аргумент для следующей ниши. Эффект снежного кома.</div>`,

t62:`<h5>📊 Как сделать</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Собрать данные из собственной аналитики: какие города самые активные, какие ниши</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">Оформить в PDF: инфографика, карты, рейтинги</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Разослать медиа: Forbes.kz, Курсив, Telegram-каналы маркетологов</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Публиковать ежеквартально → ждать от журналистов</div></div>
<div class="tip">💡 PR через данные — из «Newsjacking». Медиа любят эксклюзивную аналитику и публикуют бесплатно.</div>`,

t63:`<h5>🏦 Как подойти</h5>
<div class="step"><div class="step-num">1</div><div class="step-text">Связаться с отделом МСБ Kaspi / Halyk / Forte</div></div>

function renderTask(t, phaseId){
  const tagsHtml = (t.tags||[]).map(tag => {
    const labels = {'priority-high':'Высокий','priority-med':'Средний','priority-low':'Низкий','type-seo':'SEO','type-sales':'Продажи','type-product':'Продукт','type-marketing':'Маркетинг','type-team':'Команда'};
    return `<span class="tag ${tag}">${labels[tag]||tag}</span>`;
  }).join('');
  const howto = HOWTO[t.id] || t.howto || '';
  const isExpanded = expandedTasks[t.id];
  const vType = VICTORIA_TASKS[t.id];
  const vBtn = vType && !t.done ? `<button class="victoria-btn ${vType === 'do' ? 'can-do' : 'guide'}" onclick="event.stopPropagation();victoriaAction('${t.id}',\`${t.title.replace(/`/g,"'")}\`,'${vType}')">${VICTORIA_LABELS[vType]}</button>` : '';
  return `
    <div class="task ${t.done?'done':''} ${isExpanded?'expanded':''}">
      <div class="task-check" onclick="toggleTask('${phaseId}','${t.id}')"></div>
      <div class="task-content" onclick="toggleExpand('${t.id}')">
        <div class="task-title">${t.title}</div>
        ${t.desc ? `<div class="task-desc">${t.desc}</div>` : ''}
        <div class="task-tags">${tagsHtml}</div>
        ${howto ? `<button class="task-expand-btn" onclick="event.stopPropagation();toggleExpand('${t.id}')"><span class="chevron">▼</span> ${isExpanded ? 'Свернуть' : 'Как реализовать'}</button>` : ''}
        ${!isExpanded ? vBtn : ''}
        ${howto ? `<div class="task-howto">${howto}</div>` : ''}
        ${isExpanded ? vBtn : ''}
      </div>
      <div class="task-delete" onclick="deleteTask('${phaseId}','${t.id}')">✕</div>
    </div>
  `;
}

// ===================== ACTIONS =====================
function getAllTasks(){
  let all = [];
  state.phases.forEach(p => all.push(...p.tasks));
  return all;
}

function togglePhase(id){
  const phase = state.phases.find(p=>p.id===id);
  if(phase) phase._open = phase._open === false ? true : false;
  saveState(); render();
}

function toggleExpand(taskId){
  expandedTasks[taskId] = !expandedTasks[taskId];
  render();
}

function toggleTask(phaseId, taskId){
  const phase = state.phases.find(p=>p.id===phaseId);
  if(!phase) return;
  const task = phase.tasks.find(t=>t.id===taskId);
  if(!task) return;
  task.done = !task.done;
  saveState(); render();
  if(task.done) showToast('✅ Выполнено!');
}

function deleteTask(phaseId, taskId){
  if(!confirm('Удалить задачу?')) return;
  const phase = state.phases.find(p=>p.id===phaseId);
  if(!phase) return;
  phase.tasks = phase.tasks.filter(t=>t.id!==taskId);
  saveState(); render();
  showToast('🗑 Удалено');
}

function showAddForm(phaseId){
  document.getElementById('form-'+phaseId).classList.add('show');
}
function hideAddForm(phaseId){
  document.getElementById('form-'+phaseId).classList.remove('show');
}

function addTask(phaseId){
  const title = document.getElementById('input-title-'+phaseId).value.trim();
  if(!title){showToast('Введите название');return;}
  const desc = document.getElementById('input-desc-'+phaseId).value.trim();
  const priority = document.getElementById('input-priority-'+phaseId).value;
  const type = document.getElementById('input-type-'+phaseId).value;
  const phase = state.phases.find(p=>p.id===phaseId);
  if(!phase) return;
  phase.tasks.push({id:'c'+Date.now(),title,desc,tags:[priority,type],done:false});
  saveState(); render();
  showToast('✅ Задача добавлена');
}

function setFilter(f){ currentFilter = f; render(); }
function switchView(view){ currentView = view; render(); window.scrollTo(0,0); }
function updateNav(){
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    const views = ['roadmap','selection','finance','settings'];
    el.classList.toggle('active', views[i]===currentView);
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function closeModal(e){
  if(e.target.id==='modalOverlay') document.getElementById('modalOverlay').classList.remove('show');
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pabliki-roadmap-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('📥 Экспорт сохранён');
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      state = JSON.parse(ev.target.result);
      saveState(); render();
      showToast('📤 Импорт выполнен');
    }catch(err){
      showToast('❌ Ошибка файла');
    }
  };
  reader.readAsText(file);
}

function resetData(){
  if(!confirm('Сбросить все данные? Прогресс будет потерян.')) return;
  if(!confirm('Точно уверен?')) return;
  state = {phases: JSON.parse(JSON.stringify(DEFAULT_PHASES)), customTasks:[], version:2};
  saveState(); render();
  showToast('🗑 Данные сброшены');
}

  const cityOptions = ['all', ...PABLIKI_CITIES].map(c => 
    `<button class="city-chip ${selCity===c?'active':''}" onclick="selCity='${c}';render()">${c==='all'?'Все города':c}</button>`
  ).join('');
  
  const catIcons = {'Новостные':'📰','Вакансии':'💼','Мамочки':'👶','Авто/Недвижимость':'🚗','Еда/Досуг':'🍽️','Городские':'🏙️','Реклама/Торговля':'📢','Общие':'📱'};
  const catOptions = ['all', ...PABLIKI_CATS].map(c =>
    `<button class="city-chip ${selCat===c?'active':''}" onclick="selCat='${c}';render()">${c==='all'?'Все категории':(catIcons[c]||'')+ ' ' +c}</button>`
  ).join('');

  let tableHead, tableRows;
  
  const showLimit = 100;
  const shown = filtered.slice(0, showLimit);
  const hasMore = filtered.length > showLimit;
  
  if(selMode === 'client'){
    tableHead = `<tr><th></th><th>Город</th><th>Instagram</th><th>Кат.</th><th class="num">Подп.</th><th class="num">Цена</th></tr>`;
    tableRows = shown.map(p => {
      const checked = selSelected.has(p.ig);
      const ci = {'Новостные':'📰','Вакансии':'💼','Мамочки':'👶','Авто/Недвижимость':'🚗','Еда/Досуг':'🍽️','Городские':'🏙️','Реклама/Торговля':'📢','Общие':'📱'};
      return `<tr>
        <td><div class="sel-check ${checked?'checked':''}" onclick="toggleSel('${p.ig}')"></div></td>
        <td style="font-size:10.5px">${p.c}</td>
        <td><a class="ig-link" href="${p.l||'https://instagram.com/'+p.ig}" target="_blank">@${p.ig}</a></td>
        <td style="font-size:10px">${ci[p.t]||''}</td>
        <td class="num">${fmt(p.s)}</td>
        <td class="num">${fmt(p.p)}₸</td>
      </tr>`;
    }).join('');
  } else {
    tableHead = `<tr><th></th><th>Город</th><th>Instagram</th><th>Кат.</th><th class="num">Подп.</th><th class="num">Себест.</th><th class="num">Цена</th><th class="num">%</th></tr>`;
    tableRows = shown.map(p => {
      const checked = selSelected.has(p.ig);
      const margin = p.p > 0 ? Math.round((p.p - p.co) / p.p * 100) : 0;
      const mColor = margin >= 50 ? 'var(--green)' : margin >= 30 ? 'var(--yellow)' : 'var(--red)';
      const ci = {'Новостные':'📰','Вакансии':'💼','Мамочки':'👶','Авто/Недвижимость':'🚗','Еда/Досуг':'🍽️','Городские':'🏙️','Реклама/Торговля':'📢','Общие':'📱'};
      return `<tr>
        <td><div class="sel-check ${checked?'checked':''}" onclick="toggleSel('${p.ig}')"></div></td>
        <td style="font-size:10.5px">${p.c}</td>
        <td><a class="ig-link" href="${p.l||'https://instagram.com/'+p.ig}" target="_blank">@${p.ig}</a></td>
        <td style="font-size:10px">${ci[p.t]||''}</td>
        <td class="num">${fmt(p.s)}</td>
        <td class="num">${fmt(p.co)}₸</td>
        <td class="num">${fmt(p.p)}₸</td>
        <td class="num" style="color:${mColor};font-weight:700">${margin}%</td>
      </tr>`;
    }).join('');
  }

  app.innerHTML = `
    <div class="header">
      <h1>ПОДБОРКА</h1>
      <p>Создай медиаплан из ${PABLIKI_DB.length} пабликов</p>
    </div>
    
    <div class="mode-toggle">
      <div class="mode-btn ${selMode==='client'?'active':''}" onclick="selMode='client';render()">👤 Для клиента</div>
      <div class="mode-btn ${selMode==='full'?'active':''}" onclick="selMode='full';render()">📊 Полная</div>
    </div>
    
    <div class="filter-section">
      <h4>🏙️ Город</h4>
      <div class="city-chips">${cityOptions}</div>
    </div>
    
    <div class="filter-section">
      <h4>📂 Категория</h4>
      <div class="city-chips">${catOptions}</div>
    </div>
    
    <div class="filter-section">
      <div class="filter-row">
        <div class="filter-label">Мин. подписчики <span id="lblSubs">${fmt(selMinSubs)}</span></div>
        <input type="range" min="0" max="500000" step="5000" value="${selMinSubs}" oninput="document.getElementById('lblSubs').textContent=Number(this.value).toLocaleString('ru-RU')" onchange="selMinSubs=+this.value;render()">
      </div>
      <div class="filter-row">
        <div class="filter-label">Макс. бюджет за паблик <span id="lblPrice">${selMaxPrice>=10000000?'∞':fmt(selMaxPrice)+'₸'}</span></div>
        <input type="range" min="5000" max="10000000" step="5000" value="${selMaxPrice}" oninput="document.getElementById('lblPrice').textContent=this.value>=10000000?'∞':Number(this.value).toLocaleString('ru-RU')+'₸'" onchange="selMaxPrice=+this.value;render()">
      </div>
    </div>
    
    <div class="sel-count" style="display:flex;align-items:center;justify-content:center;gap:12px">
      <span>Найдено: <strong>${filtered.length}</strong> · Выбрано: <strong>${selected.length}</strong></span>
      <button class="city-chip ${filtered.every(p=>selSelected.has(p.ig))?'active':''}" onclick="if(getFilteredPabliki().every(p=>selSelected.has(p.ig))){getFilteredPabliki().forEach(p=>selSelected.delete(p.ig))}else{getFilteredPabliki().forEach(p=>selSelected.add(p.ig))};render()" style="font-size:11px;padding:5px 10px">${filtered.every(p=>selSelected.has(p.ig))&&filtered.length?'✕ Снять все':'☑ Выбрать все'}</button>
    </div>
    
    ${selected.length > 0 ? `
    <div class="sel-total">
      <div class="sel-total-row"><span class="label">Выбрано пабликов</span><span class="val">${selected.length}</span></div>
      <div class="sel-total-row"><span class="label">Суммарная аудитория</span><span class="val">${fmt(totalSubs)}</span></div>
      <div class="sel-total-row"><span class="label">Итого стоимость</span><span class="val">${fmt(totalPrice)}₸</span></div>
      ${selMode==='full'?`
      <div class="sel-total-row"><span class="label">Себестоимость</span><span class="val">${fmt(totalCost)}₸</span></div>
      <div class="sel-total-row"><span class="label">Маржинальность</span><span class="val green">${totalMargin}%</span></div>
      `:''}
    </div>
    <div class="sel-actions">
      <button class="btn btn-primary" onclick="exportSelPDF()">📄 PDF</button>
      <button class="btn btn-ghost" onclick="shareSel()">📤 Отправить</button>
      <button class="btn btn-ghost" onclick="selSelected.clear();render()">✕ Сбросить</button>
    </div>
    ` : ''}
    
    <div class="table-wrap">
      <table class="sel-table">
        <thead>${tableHead}</thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
    ${hasMore ? `<div style="text-align:center;padding:12px;color:var(--text2);font-size:12px">Показано ${showLimit} из ${filtered.length} · Используйте фильтры для уточнения</div>` : ''}
  `;
}

function toggleSel(ig){
  if(selSelected.has(ig)) selSelected.delete(ig);
  else selSelected.add(ig);
  render();
}

function selectAllFiltered(){
  getFilteredPabliki().forEach(p => selSelected.add(p.ig));
  render();
}

function exportSelPDF(){
  const selected = PABLIKI_DB.filter(p => selSelected.has(p.ig));
  if(!selected.length){showToast('Выберите паблики');return;}
  
  const fmt = n => n.toLocaleString('ru-RU');
  const totalSubs = selected.reduce((s,p) => s + p.s, 0);
  const totalPrice = selected.reduce((s,p) => s + p.p, 0);
  const isClient = selMode === 'client';
  const date = new Date().toLocaleDateString('ru-RU');
  
  const totalCost = selected.reduce((s,p) => s + p.co, 0);
  const totalMargin = totalPrice > 0 ? Math.round((totalPrice - totalCost) / totalPrice * 100) : 0;
  const catIcons = {'Новостные':'📰','Вакансии':'💼','Мамочки':'👶','Авто/Недвижимость':'🚗','Еда/Досуг':'🍽️','Городские':'🏙️','Реклама/Торговля':'📢','Общие':'📱'};
  
  let rows = selected.map((p,i) => {
    const margin = p.p > 0 ? Math.round((p.p - p.co) / p.p * 100) : 0;
    const mColor = margin >= 50 ? '#16a34a' : margin >= 30 ? '#ca8a04' : '#dc2626';
    return `<tr>
      <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;color:#6b7280;font-size:12px">${i+1}</td>
      <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-weight:600;color:#1f2937">${p.c}</td>
      <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;color:#2563eb;font-weight:500">@${p.ig}</td>
      <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:12px">${catIcons[p.t]||''} ${p.t||''}</td>
      <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums">${fmt(p.s)}</td>
      ${!isClient?`<td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums">${fmt(p.co)}₸</td>`:''}
      <td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-weight:600;font-variant-numeric:tabular-nums">${fmt(p.p)}₸</td>
      ${!isClient?`<td style="padding:8px 10px;border-bottom:1px solid #e5e7eb;text-align:right;font-weight:700;color:${mColor}">${margin}%</td>`:''}
    </tr>`;
  }).join('');
  
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Montserrat',sans-serif;color:#1f2937;background:#fff}
    .page{max-width:800px;margin:0 auto;padding:40px}
    .header{text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:3px solid #2563eb}
    .logo{font-size:28px;font-weight:800;color:#2563eb;letter-spacing:2px}
    .subtitle{font-size:13px;color:#6b7280;margin-top:4px}
    .stats{display:flex;justify-content:center;gap:32px;margin:24px 0}
    .stat{text-align:center}
    .stat .n{font-size:24px;font-weight:800;color:#2563eb}
    .stat .l{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
    table{width:100%;border-collapse:collapse;margin-top:16px}
    th{padding:10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#2563eb;border-bottom:2px solid #2563eb;background:#eff6ff}
    th:nth-child(5),th:nth-child(6){text-align:right}
    .footer{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af}
    @media print{.page{padding:20px}}
  </style></head><body>
  <div class="page">
    <div class="header">
      <div class="logo">PABLIKI.KZ</div>
      <div class="subtitle">${isClient?'Городская реклама нового поколения — медиаплан':'Внутренний медиаплан (полная аналитика)'} от ${date}</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n">${selected.length}</div><div class="l">пабликов</div></div>
      <div class="stat"><div class="n">${fmt(totalSubs)}</div><div class="l">аудитория</div></div>
      ${!isClient?`<div class="stat"><div class="n">${fmt(totalCost)}₸</div><div class="l">себестоимость</div></div>`:''}
      <div class="stat"><div class="n">${fmt(totalPrice)}₸</div><div class="l">${isClient?'стоимость':'продажа'}</div></div>
      ${!isClient?`<div class="stat"><div class="n" style="color:#16a34a">${totalMargin}%</div><div class="l">маржа</div></div>`:''}
    </div>
    <table>
      <thead><tr>
        <th>№</th><th>Город</th><th>Instagram</th><th>Категория</th><th style="text-align:right">Подписчики</th>
        ${!isClient?'<th style="text-align:right">Себест.</th>':''}
        <th style="text-align:right">Цена</th>
        ${!isClient?'<th style="text-align:right">Маржа</th>':''}
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="${isClient?4:4}" style="padding:12px 10px;font-weight:700;border-top:2px solid #2563eb">ИТОГО</td>
        <td style="padding:12px 10px;text-align:right;font-weight:700;border-top:2px solid #2563eb">${fmt(totalSubs)}</td>
        ${!isClient?`<td style="padding:12px 10px;text-align:right;font-weight:700;border-top:2px solid #2563eb">${fmt(totalCost)}₸</td>`:''}
        <td style="padding:12px 10px;text-align:right;font-weight:800;color:#2563eb;border-top:2px solid #2563eb;font-size:15px">${fmt(totalPrice)}₸</td>
        ${!isClient?`<td style="padding:12px 10px;text-align:right;font-weight:800;color:#16a34a;border-top:2px solid #2563eb">${totalMargin}%</td>`:''}
      </tr></tfoot>
    </table>
    <div class="footer">
      pabliki.kz · 700+ пабликов · 14 регионов · 93М+ просмотров<br>
      +7 777 151 6166 · WhatsApp
    </div>
  </div></body></html>`;
  
  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

function shareSel(){
  const selected = PABLIKI_DB.filter(p => selSelected.has(p.ig));
  if(!selected.length){showToast('Выберите паблики');return;}
  
  // Generate PDF HTML in hidden iframe, print to PDF, share as file
  const fmt = n => n.toLocaleString('ru-RU');
  const totalSubs = selected.reduce((s,p) => s + p.s, 0);
  const totalPrice = selected.reduce((s,p) => s + p.p, 0);
  const date = new Date().toLocaleDateString('ru-RU');
  const catIcons = {'Новостные':'📰','Вакансии':'💼','Мамочки':'👶','Авто/Недвижимость':'🚗','Еда/Досуг':'🍽️','Городские':'🏙️','Реклама/Торговля':'📢','Общие':'📱'};
  
  const rows = selected.map((p,i) => 
    `${i+1}. @${p.ig} (${p.c}) ${catIcons[p.t]||''} — ${fmt(p.s)} подп. — ${fmt(p.p)}₸`
  ).join('\n');
  
  const text = `📋 МЕДИАПЛАН PABLIKI.KZ\n${date}\n\n${selected.length} пабликов · ${fmt(totalSubs)} подписчиков\n\n${rows}\n\n💰 Итого: ${fmt(totalPrice)}₸\n\n🌐 pabliki.kz · +7 777 151 6166`;
  
  if(navigator.share && navigator.canShare){
    // Try sharing as file
    const blob = new Blob([text], {type:'text/plain'});
    const file = new File([blob], `mediaplan-pabliki-${new Date().toISOString().slice(0,10)}.txt`, {type:'text/plain'});
    if(navigator.canShare({files:[file]})){
      navigator.share({title:'Медиаплан Pabliki.kz', files:[file]}).catch(()=>{});
    } else {
      navigator.share({title:'Медиаплан Pabliki.kz', text}).catch(()=>{});
    }
  } else {
    navigator.clipboard.writeText(text).then(()=>showToast('📋 Скопировано!')).catch(()=>{});
  }
}

// ===================== INIT =====================
window.addEventListener('load', () => {
  setTimeout(() => {
    const s = document.getElementById('splash');
    if(s){s.style.opacity='0'; setTimeout(()=>s.remove(), 600);}
  }, 1200);
  render();
});
</script>
